<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Technology | Leitor XML</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Logotipo e título -->
        <div class="header">
            <img src="logo.png" alt="Logotipo" class="logo">
            <h1>Tax Technology | Leitor XML</h1>
        </div>

        <!-- Campo de upload e conteúdo -->
        <input type="file" id="xmlFileInput" accept=".xml" aria-label="Selecione um arquivo XML" />
        <div id="statusMessage" class="status-message"></div>
        <div id="xmlContent"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
