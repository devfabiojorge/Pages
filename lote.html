<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanfeTools - Gestão de NF-e</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .pdf-container { height: 70vh; border: 1px solid #dee2e6; border-radius: 0.25rem; }
        .drag-drop-area {
            border: 2px dashed #6c757d;
            border-radius: 0.5rem;
            padding: 2rem;
            text-align: center;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }
        .drag-drop-area.dragover { background: #e9ecef; border-color: #0d6efd; }
        .progress-container { height: 20px; background: #e9ecef; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: #0d6efd; transition: width 0.3s ease; }
        .batch-results { border: 1px solid #dee2e6; border-radius: 0.25rem; padding: 1rem; margin-top: 1rem; }
        .status-badge { font-size: 0.8rem; padding: 0.25rem 0.5rem; border-radius: 1rem; }
        .status-success { background: #d1e7dd; color: #0f5132; }
        .status-error { background: #f8d7da; color: #842029; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="card shadow">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="card-title mb-0">🔍 DanfeTools</h3>
                    <button id="toggleMode" class="btn btn-sm btn-outline-primary" onclick="toggleBatchMode()">
                        Modo Lote: ❌
                    </button>
                </div>

                <!-- Modo Single -->
                <div id="singleInput">
                    <div class="input-group">
                        <input type="text" id="nfeKey" class="form-control" 
                               placeholder="Digite a chave da NF-e (44 dígitos)" maxlength="44">
                    </div>
                </div>

                <!-- Modo Lote -->
                <div id="batchInput" class="d-none">
                    <div id="dragDropArea" class="drag-drop-area mb-3"
                         ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" 
                         ondrop="handleFileDrop(event)">
                        <p class="text-muted mb-2">📁 Arraste um arquivo .txt aqui ou</p>
                        <input type="file" id="fileInput" class="d-none" accept=".txt" 
                               onchange="handleFileSelect(event)">
                        <button class="btn btn-sm btn-outline-secondary" 
                                onclick="document.getElementById('fileInput').click()">
                            Selecione um arquivo
                        </button>
                    </div>
                    <textarea id="batchKeys" class="form-control" rows="5"
                              placeholder="Cole as chaves (uma por linha)"></textarea>
                    <small class="text-muted mt-1 d-block">Máximo de 100 chaves por lote</small>
                </div>

                <div class="btn-group mt-3 w-100">
                    <button id="buscarBtn" class="btn btn-primary" disabled onclick="buscarNota()">
                        Buscar NF-e
                    </button>
                </div>

                <!-- Progresso -->
                <div id="progressContainer" class="mt-3 d-none">
                    <div class="d-flex justify-content-between mb-2">
                        <small>Progresso: <span id="progressText">0%</span></small>
                        <small><span id="processedCount">0</span>/<span id="totalCount">0</span></small>
                    </div>
                    <div class="progress-container">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                </div>

                <!-- Resultados -->
                <div id="batchResults" class="batch-results d-none">
                    <h6 class="mb-3">📊 Resultado do Processamento</h6>
                    <div id="resultsContent"></div>
                </div>

                <!-- Mensagens -->
                <div id="loading" class="mt-3 text-center d-none">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">Processando...</p>
                </div>
                
                <div id="success" class="alert alert-success alert-dismissible mt-3 d-none">
                    <span></span>
                    <button class="close-btn" onclick="fecharMensagem(this)">×</button>
                </div>
                
                <div id="error" class="alert alert-danger alert-dismissible mt-3 d-none">
                    <span></span>
                    <button class="close-btn" onclick="fecharMensagem(this)">×</button>
                </div>
                
                <!-- Visualização PDF -->
                <div id="pdfContainer" class="pdf-container d-none mt-4">
                    <iframe id="pdfViewer"></iframe>
                </div>

                <!-- Botão Download Modo Single -->
                <button id="downloadPdfBtn" class="btn btn-success mt-2" style="display: none;">
                    Baixar PDF
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        let isBatchMode = false;
        let processingQueue = [];
        let processedItems = [];
        let currentProcessing = 0;
        const MAX_RETRIES = 2;
        const MAX_KEYS = 100;
        let chaveAtual = '';

        // Controles de Interface
        function toggleBatchMode() {
            isBatchMode = !isBatchMode;
            document.getElementById('toggleMode').innerHTML = `Modo Lote: ${isBatchMode ? '✅' : '❌'}`;
            document.getElementById('singleInput').classList.toggle('d-none', isBatchMode);
            document.getElementById('batchInput').classList.toggle('d-none', !isBatchMode);
            resetInterface();
        }

        function resetInterface() {
            document.getElementById('pdfContainer').classList.add('d-none');
            document.getElementById('batchResults').classList.add('d-none');
            document.getElementById('success').classList.add('d-none');
            document.getElementById('error').classList.add('d-none');
            document.getElementById('downloadPdfBtn').style.display = 'none';
            chaveAtual = '';
        }

        // Drag & Drop
        function handleDragOver(e) {
            e.preventDefault();
            e.stopPropagation();
            e.target.classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            e.stopPropagation();
            e.target.classList.remove('dragover');
        }

        function handleFileDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            e.target.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        }

        function handleFileSelect(e) {
            handleFile(e.target.files[0]);
        }

        async function handleFile(file) {
            if (!file.name.endsWith('.txt')) {
                mostrarErro('Apenas arquivos .txt são permitidos');
                return;
            }

            const text = await file.text();
            document.getElementById('batchKeys').value = text;
            
            // Dispara evento para atualizar o botão
            const event = new Event('input');
            document.getElementById('batchKeys').dispatchEvent(event);
        }

        // Processamento Principal
        async function buscarNota() {
            if (isBatchMode) {
                await processarLote();
            } else {
                await processarUnico();
            }
        }

        async function processarUnico() {
            const chave = document.getElementById('nfeKey').value.trim();
            if (!validarChave(chave)) return;

            try {
                toggleLoading(true);
                await prepararDados(chave);
                
                const pdfData = await obterDadosPDF(chave);
                exibirPDF(pdfData, chave);
                mostrarSucesso('NF-e carregada com sucesso!');

            } catch (erro) {
                mostrarErro(erro.message);
            } finally {
                toggleLoading(false);
            }
        }

        async function processarLote() {
            const input = document.getElementById('batchKeys').value;
            processingQueue = input.split('\n')
                .map(k => k.trim())
                .filter(k => validarChave(k))
                .slice(0, MAX_KEYS);

            if (processingQueue.length === 0) {
                mostrarErro('Nenhuma chave válida encontrada!');
                return;
            }

            try {
                toggleLoading(true);
                resetInterface();
                configurarProgresso(processingQueue.length);

                processedItems = [];
                currentProcessing = 0;

                while (currentProcessing < processingQueue.length) {
                    await processarChaveComRetry(processingQueue[currentProcessing]);
                    currentProcessing++;
                    atualizarProgresso();
                }

                exibirResultadosLote();
            } catch (error) {
                mostrarErro(`Erro no processamento: ${error.message}`);
            } finally {
                toggleLoading(false);
            }
        }

        async function processarChaveComRetry(chave, tentativa = 0) {
            try {
                await prepararDados(chave);
                const [pdf, xml] = await Promise.all([
                    obterDadosPDF(chave),
                    obterDadosXML(chave)
                ]);

                processedItems.push({
                    chave,
                    pdf,
                    xml,
                    status: 'success',
                    tentativas: tentativa + 1
                });
            } catch (error) {
                if (tentativa < MAX_RETRIES) {
                    return await processarChaveComRetry(chave, tentativa + 1);
                }
                processedItems.push({
                    chave,
                    status: 'error',
                    message: error.message,
                    tentativas: tentativa + 1
                });
            }
        }

        // Utilitários
        function validarChave(chave) {
            return /^\d{44}$/.test(chave);
        }

        function configurarProgresso(total) {
            document.getElementById('progressContainer').classList.remove('d-none');
            document.getElementById('totalCount').textContent = total;
        }

        function atualizarProgresso() {
            const percent = (currentProcessing / processingQueue.length) * 100;
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressText').textContent = `${percent.toFixed(1)}%`;
            document.getElementById('processedCount').textContent = currentProcessing;
        }

        function exibirResultadosLote() {
            const successItems = processedItems.filter(i => i.status === 'success');
            const errorItems = processedItems.filter(i => i.status === 'error');

            const resultsHTML = `
                <div class="row mb-3">
                    <div class="col">
                        <div class="alert alert-success p-2">
                            ✅ ${successItems.length} processadas com sucesso
                        </div>
                    </div>
                    <div class="col">
                        <div class="alert alert-danger p-2">
                            ❌ ${errorItems.length} falhas após ${MAX_RETRIES} tentativas
                        </div>
                    </div>
                </div>

                ${errorItems.length > 0 ? `
                <div class="mb-3">
                    <h6>Chaves com erro:</h6>
                    <div class="list-group">
                        ${errorItems.map(i => `
                            <div class="list-group-item list-group-item-danger d-flex justify-content-between align-items-center">
                                <span>${i.chave}</span>
                                <small>${i.message}</small>
                            </div>
                        `).join('')}
                    </div>
                </div>` : ''}

                <div class="d-grid gap-2">
                    ${successItems.length > 0 ? `
                    <button class="btn btn-success" onclick="baixarLote('pdf')">
                        📥 Baixar PDFs (${successItems.length})
                    </button>
                    <button class="btn btn-primary" onclick="baixarLote('xml')">
                        📥 Baixar XMLs (${successItems.length})
                    </button>` : ''}
                    
                    ${errorItems.length > 0 ? `
                    <button class="btn btn-outline-danger" onclick="exportarErros()">
                        📄 Exportar Lista de Erros
                    </button>` : ''}
                </div>
            `;

            document.getElementById('batchResults').classList.remove('d-none');
            document.getElementById('resultsContent').innerHTML = resultsHTML;
        }

        async function baixarLote(tipo) {
            const zip = new JSZip();
            const folder = zip.folder(`nfe_lote_${Date.now()}`);

            processedItems
                .filter(i => i.status === 'success')
                .forEach(item => {
                    const prefixo = tipo === 'pdf' ? 'DANFE' : 'NFe';
                    const extensao = tipo === 'pdf' ? 'pdf' : 'xml';
                    const conteudo = tipo === 'pdf' 
                        ? base64ToBlob(item.pdf.split(',')[1], 'application/pdf') 
                        : new Blob([item.xml], {type: 'application/xml'});
                    
                    folder.file(`${prefixo}_${item.chave}.${extensao}`, conteudo);
                });

            const content = await zip.generateAsync({type: "blob"});
            triggerDownload(content, `NFe_Lote_${tipo.toUpperCase()}_${Date.now()}.zip`);
        }

        function exportarErros() {
            const erros = processedItems
                .filter(i => i.status === 'error')
                .map(i => `${i.chave} | ${i.message}`)
                .join('\n');

            const blob = new Blob([erros], {type: 'text/plain'});
            triggerDownload(blob, `NFe_Erros_${Date.now()}.txt`);
        }

        function triggerDownload(content, filename) {
            const url = window.URL.createObjectURL(content);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            link.click();
            window.URL.revokeObjectURL(url);
        }

        // Funções de API
        async function prepararDados(chave) {
            const resposta = await fetch(`https://ws.meudanfe.com/api/v1/get/nfe/data/MEUDANFE/${chave}`, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: "empty"
            });

            if (!resposta.ok) throw new Error('Falha na preparação dos dados');
        }

        async function obterDadosPDF(chave) {
            const resposta = await fetch(`https://ws.meudanfe.com/api/v1/get/nfe/danfepdf/${chave}`, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: "empty"
            });

            if (!resposta.ok) throw new Error('Erro ao gerar PDF');
            
            let base64 = await resposta.text();
            return `data:application/pdf;base64,${base64.replace(/^"|"$/g, '').trim()}`;
        }

        async function obterDadosXML(chave) {
            const resposta = await fetch(`https://ws.meudanfe.com/api/v1/get/nfe/xml/${chave}`, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: "empty"
            });

            if (!resposta.ok) throw new Error('Erro ao obter XML');
            return await resposta.text();
        }

        // Utilitários
        function base64ToBlob(base64, contentType) {
            const byteCharacters = atob(base64);
            const byteArrays = [];
            
            for (let offset = 0; offset < byteCharacters.length; offset += 512) {
                const byteNumbers = new Array(512);
                for (let i = 0; i < 512 && offset + i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(offset + i);
                }
                byteArrays.push(new Uint8Array(byteNumbers));
            }
            
            return new Blob(byteArrays, {type: contentType});
        }

        function exibirPDF(pdfData, chave) {
            chaveAtual = chave;
            const pdfContainer = document.getElementById('pdfContainer');
            const pdfViewer = document.getElementById('pdfViewer');
            const downloadBtn = document.getElementById('downloadPdfBtn');

            pdfContainer.classList.remove('d-none');
            pdfViewer.src = pdfData;
            downloadBtn.style.display = 'block';
            downloadBtn.onclick = () => {
                triggerDownload(base64ToBlob(pdfData.split(',')[1], 'application/pdf'), `DANFE_${chave}.pdf`);
            };
        }

        function toggleLoading(estado) {
            document.getElementById('loading').classList.toggle('d-none', !estado);
        }

        function mostrarSucesso(mensagem) {
            const div = document.getElementById('success');
            div.querySelector('span').textContent = mensagem;
            div.classList.remove('d-none');
            setTimeout(() => div.classList.add('d-none'), 5000);
        }

        function mostrarErro(mensagem) {
            const div = document.getElementById('error');
            div.querySelector('span').textContent = mensagem;
            div.classList.remove('d-none');
            setTimeout(() => div.classList.add('d-none'), 5000);
        }

        function fecharMensagem(botao) {
            botao.parentElement.classList.add('d-none');
        }

        // Event Listeners
        document.getElementById('nfeKey').addEventListener('input', function(e) {
            const valido = validarChave(e.target.value);
            document.getElementById('buscarBtn').disabled = !valido;
            if (e.target.value !== chaveAtual) resetInterface();
        });

        document.getElementById('batchKeys').addEventListener('input', function(e) {
            const keys = e.target.value.split('\n')
                .map(k => k.trim())
                .filter(k => validarChave(k));
            document.getElementById('buscarBtn').disabled = keys.length === 0;
        });
    </script>
</body>
</html>
